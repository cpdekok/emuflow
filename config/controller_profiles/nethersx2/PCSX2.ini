; ====================================================================
; EmuFlow - NetherSX2 / AetherSX2 Configuratie
; Platform: Android Handheld (fysieke gamepad)
; Versie: 1.0.0
;
; PCSX2.ini voor NetherSX2 (Android PS2 emulator).
; NetherSX2 is een gepatched fork van AetherSX2 met verbeterde
; prestaties en bugfixes. Gebaseerd op PCSX2 open-source emulator.
;
; GEBRUIK: Kopieer naar de NetherSX2 data map:
;   /storage/emulated/0/Android/data/xyz.aethersx2.android/files/
;
; SECTIE OVERZICHT:
;   [EmuCore]         - Algemene emulatie instellingen
;   [EmuCore/GS]      - Graphics/Renderer instellingen
;   [EmuCore/Speedhacks] - Snelheidsoptimalisaties
;   [EmuCore/CPU]     - CPU emulatie instellingen
;   [Pad1]            - Controller mapping voor speler 1
; ====================================================================

[EmuCore]

; ====================================================================
; ALGEMENE EMULATIE INSTELLINGEN
; ====================================================================

; Enable cheats: uitgeschakeld by default
EnableCheats = false

; Enable Wide Screen patches: uitgeschakeld (schakel in per-game)
EnableWideScreenPatches = false

; Enable No-Interlacing patches: uitgeschakeld by default
EnableNoInterlacingPatches = false

; Fast CDVD: versnelt CD/DVD toegang emulatie
; AAN voor betere prestaties, enkele games kunnen hiermee incompatibel zijn
FastCDVD = true

; Host Filesystem: uitgeschakeld
HostFilesystem = false

; Recompiler: JIT recompiler inschakelen voor betere CPU prestaties
Recompiler = true

; Save slot: standaard saveslot (0-9)
SavestateSlot = 0

; Pause On Focus Loss: pauzeer als de app focus verliest
PauseOnFocusLoss = true

; OSD (On Screen Display) instellingen
OsdShowMessages = true
OsdShowSpeed = false
OsdShowFPS = false
OsdShowCPU = false
OsdShowResolution = false

; ====================================================================
; BIOS INSTELLINGEN
; Vereist een legale PS2 BIOS dump.
; Standaard locatie: memcards/bios/
; ====================================================================
; BiosFilename = SCPH-77001.BIN    ; Pas aan naar jouw BIOS bestandsnaam

; ====================================================================
; OPSLAG INSTELLINGEN
; ====================================================================

; Memory card formaat: PS2 (8MB MEC)
McdEnableEjection = false
McdFolderAutoManage = true

; ====================================================================
; SAVESTATE INSTELLINGEN
; ====================================================================

; Screenshots bij savestate AAN
SavestateScreenshotEnable = true

[EmuCore/GS]

; ====================================================================
; GRAPHICS / RENDERER INSTELLINGEN
; ====================================================================

; Renderer: Vulkan voor moderne chipsets (Adreno 650+, Mali-G77+)
; Opties: -1 = Auto, 12 = Vulkan, 11 = OpenGL, 14 = OpenGL ES
Renderer = 12

; Hardware Renderer: 12 = Vulkan
HWRenderer = 12

; Interne resolutie multiplicator (upscaling):
; 1 = native PS2 (512x448 of 640x448 afhankelijk van game)
; 2 = 2x upscale (~1024x896 of ~1280x896)
; 3 = 3x upscale (~1536x1344 of ~1920x1344)
; 4 = 4x upscale (~2048x1792 of ~2560x1792)
; Aanbevolen: 2-3 voor mid-range, 4 voor high-end (SD865+)
UpscaleMultiplier = 2

; Deinterlacing modus: 5 = Blend (beste kwaliteit voor de meeste games)
; 0 = Geen, 1 = Weave, 2 = Bob, 3 = Blend, 4 = Adaptive, 5 = Bob Blend
DeinterlacingMode = 3

; Anisotropic Filtering: 0 = uit, 2 = 2x, 4 = 4x, 8 = 8x, 16 = 16x
MaxAnisotropy = 4

; Mipmapping: 0 = uit, 1 = basis, 2 = volledig
MipMap = 1

; Accurate Date: verhoogt compatibiliteit, lichte prestatieimpact
AccurateDATE = 1

; Conservative Buffer Allocation: minder VRAM gebruik
ConservativeFramebuffer = true

; Framebuffer Copy On Write: verbetert compatibiliteit
UserHacks = true

; Texture Preloading: 0 = geen, 1 = partieel, 2 = volledig
PreloadTexture = 1

; Texture Filtering: PS2 shader filtering
BilinearFiltering = 1

; CRC Hack Level: 3 = automatisch per game
CrcHackLevel = 3

; Half Pixel Offset: 0 = uit, 1 = normaal, 2 = speciaal
HalfPixelOffset = 0

; Round Sprite: 0 = uit, 1 = half, 2 = volledig
RoundSprite = 0

; GPU Palettized Textures: verbetert prestaties bij Vulkan
GPUPaletteConversion = true

; Skip Presenting Duplicate Frames: verbetert batterijduur
SkipDuplicateFrames = false

; ====================================================================
; DISPLAY INSTELLINGEN
; ====================================================================

; Aspect Ratio: 0 = stretch, 1 = 4:3, 2 = widescreen (16:9)
AspectRatio = 1

; Fullscreen Mode: altijd volledig scherm op handheld
Fullscreen = true

; Linear Present: lineaire filtering bij presentatie
LinearPresent = 1

; VSync: aan voor smooth beeld
VsyncQueueSize = 2

[EmuCore/Speedhacks]

; ====================================================================
; SNELHEIDSOPTIMALISATIES
; Gebruik voorzichtig - sommige hacks veroorzaken compatibiliteitsproblemen
; ====================================================================

; EE Cyclerate: CPU cyclus ratio aanpassing
; -3 = 75%, -2 = 50%, -1 = 25%, 0 = normaal (100%), 1 = 130%, 2 = 180%, 3 = 300%
; Aanbeveling: 0 (normaal) voor de meeste games. -1 bij oververhitting.
EECycleRate = 0

; EE Cycle Skip: sla CPU cycli over (aggressieve optimalisatie)
; 0 = geen skip, 1 = minimaal, 2 = matig, 3 = maximaal
; Aanbeveling: 0 voor compatibiliteit. 1 voor langzame games.
EECycleSkip = 0

; Instant VU1: verbetert prestaties, kleine compatibiliteitsproblemen mogelijk
InstantVU1 = true

; MTVU (Multi-Threaded VU1): gebruik aparte thread voor VU1
; Sterk aanbevolen voor quad-core+ processors
MTVU = true

; Fast CDVD: ook hier instelbaar
FastCDVD = true

; Widescreen Patches: snel inschakelen/uitschakelen
WideScreenPatches = false

[EmuCore/CPU]

; ====================================================================
; CPU EMULATIE INSTELLINGEN
; ====================================================================

; Emotion Engine (EE) recompiler: JIT voor beste prestaties
Recompiler/EnableEE = true

; VU recompiler: JIT voor VU0 en VU1
Recompiler/EnableVU0 = true
Recompiler/EnableVU1 = true

; IOP recompiler (I/O Processor)
Recompiler/EnableIOP = true

; EE FPU (Floating Point Unit) extra precisie: UIT voor prestaties
Recompiler/EnableEECache = false

; ====================================================================
; GEHEUGEN INSTELLINGEN
; ====================================================================

; Geheugenkaart slot 1: standaard actief
[MemoryCards]
Slot1_Enable = true
Slot1_Filename = Mcd001.ps2

Slot2_Enable = false
Slot2_Filename = Mcd002.ps2

[Pad1]

; ====================================================================
; CONTROLLER MAPPING VOOR SPELER 1
; PS2 DualShock 2 → Android Handheld Gamepad
;
; PS2 KNOP LAYOUT:
;   Cross (X)   = onderin face buttons
;   Circle (O)  = rechts face buttons
;   Square (□)  = links face buttons
;   Triangle (△) = bovenin face buttons
;   L1/L2       = linker schouder/trigger
;   R1/R2       = rechter schouder/trigger
;   Start/Select = systeem knoppen
;   L3/R3       = stick klik links/rechts
;
; MAPPING:
;   Android A    → PS2 Cross (X)
;   Android B    → PS2 Circle (O)
;   Android X    → PS2 Square (□)
;   Android Y    → PS2 Triangle (△)
;   Android L1   → PS2 L1
;   Android R1   → PS2 R1
;   Android L2   → PS2 L2
;   Android R2   → PS2 R2
;   Android START → PS2 Start
;   Android SELECT → PS2 Select
;   Android L3   → PS2 L3
;   Android R3   → PS2 R3
;   Left Stick   → PS2 Left Analog
;   Right Stick  → PS2 Right Analog
; ====================================================================

Type = DualShock2

; Face buttons
Up = `Hat 0 North`
Down = `Hat 0 South`
Left = `Hat 0 West`
Right = `Hat 0 East`
Triangle = `Button 3`
Circle = `Button 1`
Cross = `Button 0`
Square = `Button 2`

; Systeem knoppen
Start = `Button 9`
Select = `Button 8`

; Schouder knoppen
L1 = `Button 4`
R1 = `Button 5`
L2 = `+Axis 4`
R2 = `+Axis 5`

; Stick klik
L3 = `Button 10`
R3 = `Button 11`

; Linker analoge stick
LUp = `-Axis 1`
LDown = `+Axis 1`
LLeft = `-Axis 0`
LRight = `+Axis 0`

; Rechter analoge stick
RUp = `-Axis 3`
RDown = `+Axis 3`
RLeft = `-Axis 2`
RRight = `+Axis 2`

; Rumble / trillen inschakelen
LargeMotor = `Motor Large`
SmallMotor = `Motor Small`

; Deadzone voor analoge sticks (0.0 - 1.0)
LDeadzone = 0.15
RDeadzone = 0.15

; Analoge gevoeligheid (1.0 = normaal)
LAxisScale = 1.0
RAxisScale = 1.0

; ====================================================================
; [Pad2] - [Pad4]
; Voeg toe voor multiplayer. Identiek aan [Pad1] maar met
; apparaatindex 1/2/3.
; ====================================================================

; ====================================================================
; HOTKEYS (NetherSX2 systeemhotkeys)
; ====================================================================

[Hotkeys]

; Snel opslaan (Quick Save)
SaveStateToSlot = `Keyboard/F1`

; Snel laden (Quick Load)
LoadStateFromSlot = `Keyboard/F3`

; Screenshot
Screenshot = `Keyboard/F8`

; Pauzeren
TogglePause = `Keyboard/Space`


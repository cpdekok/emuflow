########################################################################
# EmuFlow - RetroArch Basis Configuratie
# Versie: 1.0.0
# 
# Dit bestand bevat de aanbevolen basisinstellingen voor RetroArch
# op Android handheld apparaten, gebaseerd op de RGC en TechDweeb
# guides. Bevat GEEN hotkey bindings - gebruik daarvoor:
#   - retroarch_rgc.cfg (RGC standaard)
#   - retroarch_techdweeb.cfg (TechDweeb standaard)
#
# GEBRUIK: Dit bestand is bedoeld als basis. Device-specifieke
# instellingen (Vulkan vs OpenGL, audio driver) worden automatisch
# overschreven door EmuFlow op basis van hardware_profiles/chipsets.json
########################################################################


# ====================================================================
# VIDEO INSTELLINGEN
# ====================================================================

# Video driver: "vulkan" voor moderne chipsets (Snapdragon 865+, 
# Helio G99, Dimensity 1100+). Wordt overschreven per device door
# EmuFlow op basis van chipset detectie.
# Alternatieven: "opengl", "vulkan", "d3d11", "d3d12"
video_driver = "vulkan"

# Menu driver: "ozone" is de moderne, mobielvriendelijke RetroArch UI.
# Alternatieven: "xmb" (klassiek), "rgui" (lichtgewicht)
menu_driver = "ozone"

# Bilineaire filtering UIT voor pixel-perfecte weergave van retro games.
# AAN maakt het beeld vloeiender maar minder scherp.
# RGC aanbeveling: UIT voor authentieke retro look.
video_smooth = "false"

# Integer scaling AAN: schaalt het beeld in exacte veelvouden (1x, 2x, 3x).
# Voorkomt sub-pixel vervorming. Aanbevolen voor retro systemen.
# RGC aanbeveling: AAN voor pixel-perfecte weergave.
video_integer_scaling = "true"

# Volledig scherm: false = windowed/fullscreen via Android systeem.
# Op Android handheld altijd false laten staan.
video_windowed_fullscreen = "false"

# Frame throttle: true = RetroArch limiteert framerate tot de doelfrequentie.
# Voorkomt dat het spel te snel loopt bij krachtige hardware.
video_frame_delay_auto = "true"

# Vsync AAN: synchroniseer met het schermverversingssnelheid.
# Vermindert screen tearing. Kleine prestatieimpact.
video_vsync = "true"

# Aspect ratio: "auto" gebruikt de native verhouding van het systeem.
# Alternatieven: "4:3", "16:9", "custom"
video_aspect_ratio_auto = "true"

# Crop overscan: verwijder de zwarte randen die sommige retro spellen hebben.
video_crop_overscan = "false"

# Schermrotatie: 0 = geen rotatie (normaal liggend)
# Waarden: 0 = normaal, 1 = 90° CW, 2 = 180°, 3 = 90° CCW
video_rotation = "0"

# Hardware geaccelereerde rendering voor cores die dat ondersteunen.
video_shared_context = "true"


# ====================================================================
# AUDIO INSTELLINGEN
# ====================================================================

# Audio driver: "audiotrack" is de aanbevolen Android audio driver.
# Stabiel en laag-latent op de meeste Android apparaten.
# Alternatieven: "opensles", "oboe" (experimenteel)
audio_driver = "audiotrack"

# Audio inschakelen.
audio_enable = "true"

# Audio synchronisatie: synchroniseer audio met video voor vloeiend geluid.
audio_sync = "true"

# Latency buffer in milliseconden. 64ms is een goede balans.
# Lagere waarde = minder latency maar risico op audio glitches.
# Hogere waarde = meer latency maar stabielere audio.
audio_latency = "64"

# Audio output rate in Hz. 48000 is standaard voor Android.
audio_out_rate = "48000"

# Volume: 100 = volledig volume (0-100 schaal)
audio_volume = "100"


# ====================================================================
# INVOER / INPUT INSTELLINGEN
# ====================================================================

# Input driver: "android" voor Android apparaten.
input_driver = "android"

# Auto game focus: AAN (1) = RetroArch neemt automatisch input focus
# bij starten van een spel. UIT (0) = handmatig focussen.
# RGC aanbeveling: 0 (UIT) voor betere multi-tasking.
input_auto_game_focus = "0"

# Input block timeout (Android-specifiek):
# Blokkeert invoer gedurende N frames na menu-opening.
# Voorkomt ongewenste menu-navigatie. TechDweeb aanbeveling: 1.
input_block_timeout = "1"

# Analog to Digital: Left Analog werkt ook als D-pad.
# 0 = uitgeschakeld, 1 = Left Analog, 2 = Right Analog
input_analog_dpad_mode = "1"

# Menu toggle gamepad combo: 4 = L3+R3 tegelijk.
# Backup voor de menu toggle knop binding.
input_menu_toggle_gamepad_combo = "4"

# Toetsenbord ghosting filter: filtereer duplicate invoer.
input_keyboard_gamepad_mapping_type = "1"

# Overlays verbergen in menu: verberg touchscreen overlay in het menu.
input_overlay_hide_in_menu = "true"

# Muis cursor verbergen bij overlay gebruik.
input_overlay_show_mouse_cursor = "false"

# Overlay bij controller verbergen: verberg overlay als fysieke controller
# is aangesloten. RGC aanbeveling: AAN.
input_overlay_hide_in_menu = "true"


# ====================================================================
# SAVESTATE INSTELLINGEN
# ====================================================================

# Automatisch opslaan bij verlaten van content.
# Beschermt tegen dataverlies bij onverwacht afsluiten.
# RGC en TechDweeb aanbeveling: AAN.
savestate_auto_save = "true"

# Automatisch laden bij starten van content.
# Laadt de laatste autosave bij het openen van een ROM.
savestate_auto_load = "true"

# Thumbnail modus voor savestates: sla schermafbeelding op bij save.
savestate_thumbnail_enable = "true"

# Incrementele savestates: gebruik meerdere slots (0-999).
savestate_auto_index = "false"


# ====================================================================
# REWIND INSTELLINGEN
# ====================================================================

# Rewind globaal UITGESCHAKELD by default.
# Verbruikt extra RAM (tot 600MB bij lange rewind-buffer).
# Inschakelen per-core via Quick Menu indien gewenst.
# ALLEEN aanbevolen voor: NES, SNES, GB/GBC/GBA, Genesis/MD.
# NIET aanbevolen voor: PS1, N64, PS2, GCN, Wii en hoger.
rewind_enable = "false"

# Rewind buffer grootte in MB (als ingeschakeld).
rewind_buffer_size = "32"

# Rewind granulariteit: elke N frames een rewind frame opslaan.
# Hogere waarde = minder RAM maar minder nauwkeurig terugspoelen.
rewind_granularity = "2"


# ====================================================================
# RUN-AHEAD INSTELLINGEN
# ====================================================================

# Run-Ahead globaal UITGESCHAKELD by default.
# Reduceert input lag door frames vooruit te berekenen.
# VEREIST krachtige hardware: Snapdragon 865+ of vergelijkbaar.
# Inschakelen per-core via Quick Menu.
run_ahead_enabled = "false"

# Aantal run-ahead frames (als ingeschakeld).
# 1-2 frames aanbevolen voor NES/SNES/Genesis.
run_ahead_frames = "1"

# Second instance run-ahead: aparte emulatorinstantie voor run-ahead.
# Stabieler maar hogere CPU-belasting.
run_ahead_secondary_instance = "false"


# ====================================================================
# QUIT / AFSLUITEN INSTELLINGEN
# ====================================================================

# Bevestiging bij afsluiten UITGESCHAKELD.
# SELECT+START sluit direct af zonder extra bevestigingsscherm.
# RGC en TechDweeb aanbeveling: UIT.
quit_press_twice = "false"

# Bevestiging bij overwrite van savefile: vraag bevestiging bij
# opslaan in een bezette saveslot.
savestate_auto_save = "true"


# ====================================================================
# NETWERK / ONLINE INSTELLINGEN
# ====================================================================

# Netplay ingeschakeld: UIT by default.
netplay_enable = "false"

# Online achievements (RetroAchievements): UIT by default.
# Inschakelen vereist een RetroAchievements account.
cheevos_enable = "false"


# ====================================================================
# DIRECTORY INSTELLINGEN (Android standaard paden)
# ====================================================================

# ROMs directory (pas aan naar jouw opslaglocatie)
# rgui_browser_directory = "/storage/emulated/0/ROMs"

# Savestates directory
# savestate_directory = "/storage/emulated/0/RetroArch/states"

# SRAM/Save files directory
# savefile_directory = "/storage/emulated/0/RetroArch/saves"

# Screenshots directory
# screenshot_directory = "/storage/emulated/0/RetroArch/screenshots"

# System/BIOS bestanden directory
# system_directory = "/storage/emulated/0/RetroArch/system"


# ====================================================================
# PERFORMANCE INSTELLINGEN
# ====================================================================

# Threaded video: schakel video rendering in een aparte thread.
# Verbetert prestaties op multi-core apparaten.
video_threaded = "true"

# Hard GPU sync: synchroniseer GPU en CPU direct.
# Vermindert input lag maar kan prestaties verlagen.
# Aanbeveling: UIT tenzij specifiek nodig.
hard_gpu_sync = "false"

# Frame delay: handmatige vertraging in milliseconden voor timing.
# 0 = geen vertraging.
frame_time_counter_reset_after_fastforwarding = "true"


# ====================================================================
# SCHERMWEERGAVE / OSD INSTELLINGEN
# ====================================================================

# FPS teller tonen bij opstarten: UIT (schakel in via SELECT+Y/hotkey).
fps_show = "false"

# Geheugengebruik tonen: UIT.
memory_show = "false"

# Berichten tonen op scherm (save state confirmaties, etc.).
video_font_enable = "true"

# Bericht positie: linksonder op het scherm.
video_message_pos_x = "0.05"
video_message_pos_y = "0.05"


########################################################################
# EINDE RETROARCH BASIS CONFIGURATIE
# EmuFlow Profile ID: retroarch_base
# Versie: 1.0.0
# 
# Combineer dit bestand met een hotkey profiel:
#   - retroarch_rgc.cfg voor de RGC standaard
#   - retroarch_techdweeb.cfg voor de TechDweeb standaard
########################################################################

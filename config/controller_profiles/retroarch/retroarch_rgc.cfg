########################################################################
# EmuFlow - RetroArch Hotkey Configuratie: RGC Standaard
# Gebaseerd op: Retro Game Corps (RGC) RetroArch Starter Guide
# Bron: retrogamecorps.com/2022/02/28/retroarch-starter-guide/
# 
# GEBRUIK: Kopieer deze bindings naar retroarch.cfg of gebruik als
# override configuratie. Dit bestand bevat ALLEEN hotkey bindings.
# Combineer met retroarch_base.cfg voor volledige configuratie.
#
# KNOPINDICES (standaard Android XInput/DInput layout):
#   0 = Y knop
#   1 = B knop
#   2 = X knop
#   3 = START knop
#   4 = L1 (linker schouderknop)
#   5 = R1 (rechter schouderknop)
#   6 = SELECT knop
#   7 = R2 (rechter trigger)
#   8 = L2 (linker trigger)
#   9 = L3 (linker stick klik)
#  10 = R3 (rechter stick klik)
#
# ASSEN:
#   +0 = D-pad Right / Rechter X-as positief
#   -0 = D-pad Left  / Linker X-as negatief
#   +1 = D-pad Down  / Y-as positief
#   -1 = D-pad Up    / Y-as negatief
########################################################################


# ====================================================================
# HOTKEY ENABLE
# Houd SELECT ingedrukt + druk andere knop = activeer hotkey
# SELECT = knopindex 6
# ====================================================================
input_enable_hotkey_btn = "6"


# ====================================================================
# MENU TOGGLE
# X knop opent/sluit het RetroArch Quick Menu
# Alternatief: houd START 2 seconden ingedrukt (RetroArch ingebouwde functie)
# X = knopindex 2
# ====================================================================
input_menu_toggle_btn = "2"


# ====================================================================
# SAVE STATE (SELECT + R1)
# Sla de huidige spelstatus op in de actieve saveslot
# R1 = knopindex 5
# ====================================================================
input_save_state_btn = "5"


# ====================================================================
# LOAD STATE (SELECT + L1)
# Laad de opgeslagen spelstatus uit de actieve saveslot
# L1 = knopindex 4
# ====================================================================
input_load_state_btn = "4"


# ====================================================================
# FAST FORWARD - HOLD (SELECT + R2)
# Versnel emulatie zolang SELECT+R2 ingehouden wordt (hold modus)
# Voor toggle modus: gebruik input_toggle_fast_forward_btn ipv
# input_hold_fast_forward_btn
# R2 = knopindex 7
# ====================================================================
input_hold_fast_forward_btn = "7"


# ====================================================================
# REWIND (SELECT + L2)
# Spoel het spel terug. VEREIST: rewind_enable = "true" in instellingen
# WAARSCHUWING: Rewind verbruikt extra RAM en CPU. Alleen inschakelen
# voor lichte systemen (NES/SNES/GBA). NIET voor PS1/N64/PS2/GC.
# L2 = knopindex 8
# ====================================================================
input_rewind_btn = "8"


# ====================================================================
# AFSLUITEN / QUIT (SELECT + START)
# Sluit de huidige content/ROM. Keert terug naar RetroArch hoofdmenu.
# Met quit_press_twice = "false" geen bevestigingsvenster nodig.
# START = knopindex 3
# ====================================================================
input_exit_emulator_btn = "3"


# ====================================================================
# FPS TELLER TOGGLE (SELECT + Y)
# Toon/verberg de FPS teller in de hoek van het scherm.
# Handig voor performance monitoring en troubleshooting.
# Y = knopindex 0
# ====================================================================
input_fps_toggle_btn = "0"


# ====================================================================
# GAME RESET (SELECT + B)
# Reset het huidige spel (soft reset).
# Equivalent aan de fysieke reset knop op de originele console.
# B = knopindex 1
# ====================================================================
input_reset_btn = "1"


# ====================================================================
# VOLUME OMHOOG (SELECT + D-pad Right)
# Verhoog het systeemvolume
# D-pad Right = positieve X-as richting
# ====================================================================
input_volume_up_axis = "+0"


# ====================================================================
# VOLUME OMLAAG (SELECT + D-pad Left)
# Verlaag het systeemvolume
# D-pad Left = negatieve X-as richting
# ====================================================================
input_volume_down_axis = "-0"


# ====================================================================
# RUN-AHEAD TOGGLE (SELECT + D-pad Up)
# Schakel Run-Ahead in/uit voor input lag reductie.
# Run-Ahead berekent frames vooruit om input lag te minimaliseren.
# VEREIST: krachtige hardware (Snapdragon 865+ aanbevolen)
# D-pad Up = negatieve Y-as richting
# ====================================================================
input_runahead_toggle_axis = "-1"


# ====================================================================
# VOLGENDE SAVESLOT (SELECT + D-pad Up)  
# Notitie RGC: RGC gebruikt D-pad Up primair voor Run-Ahead.
# Saveslot wisselen kan ook via het Quick Menu.
# ====================================================================
# input_state_slot_increase_axis = "-1"    # GECOMMENTARIEERD - conflict met run_ahead


# ====================================================================
# VORIGE SAVESLOT (SELECT + D-pad Down)
# Notitie: Kan eventueel ingeschakeld worden als run-ahead niet
# via directe hotkey geconfigureerd is.
# ====================================================================
# input_state_slot_decrease_axis = "+1"    # GECOMMENTARIEERD - optioneel


# ====================================================================
# L3+R3 MENU COMBO (backup voor menu toggle)
# Waarde 4 = L3+R3 simultaan ingedrukt = open Quick Menu
# Dit werkt zonder de hotkey enable knop
# ====================================================================
input_menu_toggle_gamepad_combo = "4"


# ====================================================================
# SLOW MOTION HOLD (optioneel, geen standaard RGC binding)
# Ingehouden slow motion werking. Kan worden toegewezen als gewenst.
# ====================================================================
# input_hold_slowmotion_btn = ""           # GECOMMENTARIEERD - niet standaard RGC


########################################################################
# EINDE RGC HOTKEY CONFIGURATIE
# EmuFlow Profile ID: rgc_standard
# Versie: 1.0.0
########################################################################

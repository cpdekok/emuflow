; ====================================================================
; EmuFlow - PPSSPP Controller Configuratie
; Platform: Android Handheld (fysieke gamepad)
; Versie: 1.0.0
;
; PPSSPP Control Mapping voor standaard Android handheld controllers.
; Gebaseerd op de standaard XInput/DInput layout met:
;   A/B/X/Y = face buttons
;   L1/R1 = schouder triggers
;   L2/R2 = analoge triggers
;   START/SELECT = systeem knoppen
;   D-pad, Left Stick, Right Stick = beweging
;
; PSP KNOP LAYOUT:
;   Cross (X)   = zuidknop (onderin face buttons)
;   Circle (O)  = oost knop (rechts in face buttons)
;   Square (□)  = west knop (links in face buttons)
;   Triangle (△) = noord knop (boverin face buttons)
;
; ANDROID GAMEPAD DEVICE CODES (standaard):
;   Knopcode 96  = A (Cross equivalent)
;   Knopcode 97  = B (Circle equivalent)
;   Knopcode 99  = X (Square equivalent)
;   Knopcode 100 = Y (Triangle equivalent)
;   Knopcode 102 = L1
;   Knopcode 103 = R1
;   Knopcode 108 = SELECT (Back)
;   Knopcode 109 = START
;   Knopcode 19  = D-pad Up
;   Knopcode 20  = D-pad Down
;   Knopcode 21  = D-pad Left
;   Knopcode 22  = D-pad Right
;   Knopcode 106 = L2 (trigger)
;   Knopcode 107 = R2 (trigger)
;   Knopcode 317 = L3 (stick klik links)
;   Knopcode 318 = R3 (stick klik rechts)
; ====================================================================

[ControlMapping]

; ====================================================================
; FACE BUTTONS
; PSP Cross (X) → Android A knop
; ====================================================================
Cross = 1-key:96

; PSP Circle (O) → Android B knop
Circle = 1-key:97

; PSP Square (□) → Android X knop
Square = 1-key:99

; PSP Triangle (△) → Android Y knop
Triangle = 1-key:100

; ====================================================================
; SCHOUDER KNOPPEN
; ====================================================================

; PSP L trigger → Android L1
L = 1-key:102

; PSP R trigger → Android R1
R = 1-key:103

; ====================================================================
; SYSTEEM KNOPPEN
; ====================================================================

; PSP Start → Android START knop
Start = 1-key:109

; PSP Select → Android SELECT/Back knop
Select = 1-key:108

; ====================================================================
; RICHTINGSKNOPJES (D-PAD)
; ====================================================================

; D-pad Omhoog
Up = 1-key:19

; D-pad Omlaag
Down = 1-key:20

; D-pad Links
Left = 1-key:21

; D-pad Rechts
Right = 1-key:22

; ====================================================================
; LINKER ANALOGE STICK
; ====================================================================

; Linker stick Omhoog
LeftStickUp = 1-axis:1:-1

; Linker stick Omlaag
LeftStickDown = 1-axis:1:1

; Linker stick Links
LeftStickLeft = 1-axis:0:-1

; Linker stick Rechts
LeftStickRight = 1-axis:0:1

; ====================================================================
; RECHTER ANALOGE STICK (C-Stick / Camera)
; Niet aanwezig op PSP hardware, maar nuttig voor camera control
; in sommige games en emulatiefuncties.
; ====================================================================

; Rechter stick Omhoog
RightStickUp = 1-axis:3:-1

; Rechter stick Omlaag
RightStickDown = 1-axis:3:1

; Rechter stick Links
RightStickLeft = 1-axis:2:-1

; Rechter stick Rechts
RightStickRight = 1-axis:2:1

; ====================================================================
; PPSSPP HOTKEYS / SPECIALE FUNCTIES
;
; L+R+Start = Terug naar PPSSPP Menu
; PPSSPP intern: deze combo stuurt een "pause" commando
; ====================================================================

; Menu/Pause: L+R+Start combinatie
Pause = 1-key:102,1-key:103,1-key:109

; Screenshot: L+R+Select combinatie
Screenshot = 1-key:102,1-key:103,1-key:108

; ====================================================================
; PPSSPP SPECIFIEKE FUNCTIES
; ====================================================================

; Snelheid toggle (Fast Forward): R2 knop
SpeedToggle = 1-key:107

; Slow Motion: L2 knop
Slow = 1-key:106

; Savegame opslaan (in-game save, niet savestate)
; Wordt afgehandeld door het spel zelf

; ====================================================================
; ANALOGE STICKS - PPSSPP INTERNE MAPPING
; PSP heeft één analoge stick. PPSSPP mapt linker analog als PSP analog.
; ====================================================================

; Analoge stick Up
AnalogUp = 1-axis:1:-1

; Analoge stick Down
AnalogDown = 1-axis:1:1

; Analoge stick Links
AnalogLeft = 1-axis:0:-1

; Analoge stick Rechts
AnalogRight = 1-axis:0:1

; ====================================================================
; TOUCH EMULATIE (voor PSP games die touch gebruiken)
; Niet van toepassing op standaard handheld setup.
; ====================================================================

; RapidFire (optioneel)
; RapidFire = 1-key:318

; ====================================================================
; PPSSPP INSTELLINGEN AANBEVELINGEN (niet in dit bestand, maar in
; ppsspp.ini / PSP/SYSTEM/ppsspp.ini):
;
; [General]
; NumWorkerThreads = 0         ; Auto
; EnableCheats = False
;
; [Graphics]
; RenderingMode = 1            ; Buffered Rendering (aanbevolen)
; SoftwareRenderer = False
; ResolutionScale = 2          ; 2x = 960x544 (aanbevolen voor moderne hardware)
; MipMapping = True
; TextureFiltering = 1         ; Auto
; InternalResolutionW = 0
; InternalResolutionH = 0
; AndroidHwScale = 1
; FrameSkip = 0
; FrameSkipType = 0
;
; [Sound]
; Enable = True
; AudioBackend = 0             ; Auto
; AudioLatency = 1             ; Low latency
;
; [Controls]
; HapticFeedback = True
; ====================================================================

; ====================================================================
; EINDE PPSSPP CONTROLS CONFIGURATIE
; EmuFlow Profile ID: ppsspp_android_handheld
; Versie: 1.0.0
; ====================================================================

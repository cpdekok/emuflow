; ====================================================================
; EmuFlow - Lime3DS Configuratie
; Platform: Android Handheld (fysieke gamepad)
; Versie: 1.0.0
;
; qt-config.ini voor Lime3DS (3DS emulator voor Android).
; Lime3DS is een fork van Citra geoptimaliseerd voor Android.
;
; GEBRUIK: Kopieer naar de Lime3DS configuratiemap:
;   /storage/emulated/0/Android/data/io.github.lime3ds.android/files/config/
;
; 3DS KNOP LAYOUT:
;   A, B, X, Y = face buttons
;   L, R = schouder knoppen
;   ZL, ZR = extra triggers (New 3DS)
;   Start, Select = systeem knoppen
;   D-pad = kruisknopjes
;   Circle Pad = analoge stick (boven)
;   C-Stick = analoge stick (New 3DS, onder)
;
; ANDROID → 3DS MAPPING:
;   Android A    → 3DS A
;   Android B    → 3DS B
;   Android X    → 3DS X
;   Android Y    → 3DS Y
;   Android L1   → 3DS L
;   Android R1   → 3DS R
;   Android L2   → 3DS ZL (New 3DS)
;   Android R2   → 3DS ZR (New 3DS)
;   Android START → 3DS Start
;   Android SELECT → 3DS Select
;   Android D-pad → 3DS D-pad
;   Left Stick   → 3DS Circle Pad
;   Right Stick  → 3DS C-Stick (New 3DS)
; ====================================================================

[Controls]

; ====================================================================
; FACE BUTTONS
; ====================================================================

; 3DS A knop → Android A knop
button_a\activate = `button:0`

; 3DS B knop → Android B knop
button_b\activate = `button:1`

; 3DS X knop → Android X knop
button_x\activate = `button:2`

; 3DS Y knop → Android Y knop
button_y\activate = `button:3`

; ====================================================================
; SCHOUDER KNOPPEN
; ====================================================================

; 3DS L trigger → Android L1
button_l\activate = `button:4`

; 3DS R trigger → Android R1
button_r\activate = `button:5`

; 3DS ZL (New 3DS) → Android L2
button_zl\activate = `axis:4:+`

; 3DS ZR (New 3DS) → Android R2
button_zr\activate = `axis:5:+`

; ====================================================================
; SYSTEEM KNOPPEN
; ====================================================================

; 3DS Start → Android START
button_start\activate = `button:9`

; 3DS Select → Android SELECT
button_select\activate = `button:8`

; Home knop (optioneel: L3 of via menu)
button_home\activate = `button:10`

; ====================================================================
; D-PAD RICHTINGSKNOPJES
; ====================================================================

; D-pad Omhoog
button_dup\activate = `hat:0:up`

; D-pad Omlaag
button_ddown\activate = `hat:0:down`

; D-pad Links
button_dleft\activate = `hat:0:left`

; D-pad Rechts
button_dright\activate = `hat:0:right`

; ====================================================================
; CIRCLE PAD (ANALOGE STICK - HOOFD)
; Android Left Stick → 3DS Circle Pad
; ====================================================================

; Circle Pad Omhoog
circle_pad_up\activate = `axis:1:-`
circle_pad_up\modifier = `none`

; Circle Pad Omlaag
circle_pad_down\activate = `axis:1:+`
circle_pad_down\modifier = `none`

; Circle Pad Links
circle_pad_left\activate = `axis:0:-`
circle_pad_left\modifier = `none`

; Circle Pad Rechts
circle_pad_right\activate = `axis:0:+`
circle_pad_right\modifier = `none`

; ====================================================================
; C-STICK (New 3DS analoge stick - rechts)
; Android Right Stick → 3DS C-Stick
; ====================================================================

; C-Stick Omhoog
cstick_up\activate = `axis:3:-`

; C-Stick Omlaag
cstick_down\activate = `axis:3:+`

; C-Stick Links
cstick_left\activate = `axis:2:-`

; C-Stick Rechts
cstick_right\activate = `axis:2:+`

; ====================================================================
; DEADZONE EN MODIFIER INSTELLINGEN
; ====================================================================

; Analoge stick deadzone (0.000000 - 1.000000)
analog_stick_deadzone = 0.15

; Modifier scale: percentage van volledige doorslag bij modifier ingedrukt
modifier_scale = 0.5

[Renderer]

; ====================================================================
; RENDERER INSTELLINGEN
; ====================================================================

; Graphics API: 0 = OpenGL, 1 = Vulkan
; Aanbeveling: 1 (Vulkan) voor moderne chipsets
graphics_api = 1

; Fysiek apparaat (GPU) selectie: 0 = auto
physical_device = 0

; Interne resolutie: 1 = native 3DS (400x240 boven, 320x240 onder)
; 2 = 2x, 3 = 3x, etc.
; Aanbevolen: 2-4 voor Android handhelds
resolution_factor = 2

; Hardware Renderer: true = gebruik GPU hardware rendering
use_hw_renderer = true

; Shader JIT compilatie: true = betere GPU prestaties
use_shader_jit = true

; Disk Shader Cache: cache compiled shaders op schijf
use_disk_shader_cache = true

; Async Shader Compilation: compileer shaders asynchroon (vermindert stottering)
async_shader_compilation = true

; Async Presentation: presenteer frames asynchroon
async_presentation = true

; SPIRV Shader Generation: gebruik SPIR-V shaders (Vulkan)
spirv_shader_gen = true

; Dump Textures: UIT (alleen voor debugging)
dump_textures = false

; Custom Textures: UIT by default
custom_textures = false

; Preload Custom Textures: UIT
preload_custom_textures = false

; Filter: 0 = geen, 1 = Anime4K, 2 = BICUBIC, 3 = GAUSSIAN, 4 = NEAREST
texture_filter = 0

; Scaling Filter: 0 = nearest, 1 = linear
texture_sampling = 1

; Stereoscopic 3D: uitgeschakeld op handheld zonder 3D scherm
render_3d = 0

; Stereoscopic 3D diepte (0 = 2D modus)
factor_3d = 0

; Achtergrondkleur: zwart
bg_red = 0
bg_green = 0
bg_blue = 0

[Layout]

; ====================================================================
; SCHERM LAYOUT INSTELLINGEN
; ====================================================================

; Layout modus: 
; 0 = Default (boven groot, onder klein rechtsonder)
; 1 = Single Screen (alleen bovenste scherm)
; 2 = Large Screen (boven groot, onder naast)
; 3 = Side by Side (naast elkaar)
; 4 = Hybrid Screen (boven groot met onder klein overlay)
; 5 = Mobile Portrait (boven boven onder, portret)
; 6 = Mobile Landscape (boven links, onder rechts, liggend)
; Aanbeveling voor handheld: 6 (Mobile Landscape) of 0 (Default)
layout_option = 0

; Swap schermen: false = boven = 3DS bovenste scherm
swap_screen = false

; Ondersteboven weergave: false = normaal
upright_screen = false

; Aangepaste layout inschakelen: false = gebruik vooraf ingestelde layout
custom_layout = false

; Aangepaste layout coördinaten (alleen actief als custom_layout = true)
custom_top_left = 0
custom_top_top = 0
custom_top_right = 400
custom_top_bottom = 240
custom_bottom_left = 40
custom_bottom_top = 260
custom_bottom_right = 360
custom_bottom_bottom = 500

; Schermhoogte (0 = auto)
screen_height = 0

; ====================================================================
; MOBILE LAYOUT INSTELLINGEN
; ====================================================================

; Landscape modus: groot scherm links, klein scherm rechts
; Dit is de standaard voor Android handheld landscape gebruik
large_screen_proportion = 4

[Audio]

; ====================================================================
; AUDIO INSTELLINGEN
; ====================================================================

; Audio uitvoer engine: 
; auto = automatisch selecteren
; cubeb = cross-platform (aanbevolen)
; sdl2 = SDL2 audio
; null = geen geluid
output_engine = auto

; Audio uitvoerdevice: default = standaard apparaat
output_device = default

; Ingang audio engine (microfoon)
input_engine = auto

; Ingang audio device: default = standaard microfoon
input_device = default

; Volume: 100 = volledig volume (0-200 bereik, 100 = normaal)
output_volume = 100

; Ingang volume
input_volume = 100

; Audio stretch: stretch audio om gelijke afspeelsnelheid te behouden
; Vermindert audio glitches maar lichte kwaliteitsreductie
enable_audio_stretching = true

; Audio latency in milliseconden: 120ms voor stabiliteit
; Lagere waarde = minder latency maar meer kans op glitches
audio_latency = 120

[Core]

; ====================================================================
; KERN EMULATIE INSTELLINGEN
; ====================================================================

; CPU kloksnelheid: 100 = normaal (3DS snelheid)
; Hogere waarden = snellere emulatie maar meer warmte/batterijgebruik
cpu_clock_percentage = 100

; New 3DS modus: true = emuleer New 3DS (hogere CPU, meer RAM, C-Stick, ZL/ZR)
; Aanbeveling: true voor betere compatibiliteit met New 3DS exclusieve games
is_new_3ds = true

; LLE applets: Low Level Emulatie van systeem applets
; Alleen inschakelen voor specifieke compatibiliteitsproblemen
lle_applets = false

[System]

; ====================================================================
; SYSTEEM INSTELLINGEN
; ====================================================================

; Regio: 2 = Europa, 1 = VS, 0 = Japan
region_value = 2

; Tijdzone offset (in seconden van UTC)
; 3600 = UTC+1 (Nederland)
init_clock = 0
init_ticks_type = 0

; Netwerk: ingeschakeld voor SpotPass/StreetPass emulatie
wifi_enable = false

[UI]

; ====================================================================
; INTERFACE INSTELLINGEN
; ====================================================================

; Volledig scherm bij starten: true voor handheld
start_in_fullscreen_mode = true

; Recent bestanden opslaan
recent_files\size = 10

; Taal
language = nl

; Schermhelderheidssaving: toestaan dat Android scherm dimmen beheert
inhibit_screensaver = true

; ====================================================================
; EINDE LIME3DS CONFIGURATIE
; EmuFlow Profile ID: lime3ds_android_handheld
; Versie: 1.0.0
; ====================================================================
